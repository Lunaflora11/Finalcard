<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><link rel="stylesheet" href="style.css">
    <style>
        .timer-circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--card-red); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; font-size: 20px; }
        .score-badge { background: var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>🏆 وضع التحدي</span>
        <span class="score-badge" id="live-score">النقاط: 0</span>
    </div>

    <div class="glass-box">
        <div class="timer-circle" id="timer">30</div>
        <div id="quiz-container">
            <h3 id="question">جاري التحميل...</h3>
            <div id="options"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        const questions = [
            { q: "عند سحب كرت دون إرجاعه، هل المقام يقل؟", a: ["نعم", "لا"], c: 0 },
            { q: "ما احتمال سحب كرت أسود من 52 كرت؟", a: ["26/52", "13/52"], c: 0 },
            { q: "الحوادث التي لا تؤثر نتائجها على بعضها تسمى..", a: ["مستقلة", "متنافية"], c: 0 },
            { q: "إذا سحبت كرت (7) ثم أرجعته، هل تتغير فرص السحبة الثانية؟", a: ["نعم", "لا"], c: 1 }
        ];

        function startQuiz() {
            const timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("انتهى الوقت! نقاطك: " + score);
                    location.href = 'modes.html';
                }
            }, 1000);
            showQuestion();
        }

        function showQuestion() {
            const qObj = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('question').innerText = qObj.q;
            document.getElementById('options').innerHTML = "";
            qObj.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn-nav";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(i === qObj.c) score += 20;
                    document.getElementById('live-score').innerText = "النقاط: " + score;
                    showQuestion();
                };
                document.getElementById('options').appendChild(btn);
            });
        }
        startQuiz();
        if(score >= 100) {
    let b = JSON.parse(localStorage.getItem('my_badges') || '[]');
    if(!b.includes('pro')) b.push('pro'); // وسام المحترف
    localStorage.setItem('my_badges', JSON.stringify(b));
        }
    
    </script>
</body>
</html>
