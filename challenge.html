<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar"><span>🏆 التحدي</span><span id="timer">⏱️ 20</span></div>
    <div class="glass-box">
        <h3 id="q">إذا سحبنا كرت من 52 دون إرجاع، كم يصبح المقام في السحبة الثانية؟</h3>
        <button class="btn-nav" onclick="ans(true)">51</button>
        <button class="btn-nav" onclick="ans(false)">52</button>
    </div>
    <script>
        let t = 20;
        setInterval(() => { t--; document.getElementById('timer').innerText = "⏱️ " + t; if(t<=0) location.href='index.html'; }, 1000);
        function ans(c) { if(c) alert("صحيح! +50 نقطة"); else alert("خطأ!"); location.href='index.html'; }
    </script>
</body>
</html>
