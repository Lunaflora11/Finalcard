<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar"><span>الوضع: غير مستقلة</span><span id="vTotal">المقام: 52</span></div>
    <div class="glass-box">
        <div class="chart-area">
            <div class="bar" id="barA" style="background:red;"><span class="bar-label">أحمر<br><span id="vA">26/52</span></span></div>
            <div class="bar" id="barB" style="background:black;"><span class="bar-label">أسود<br><span id="vB">26/52</span></span></div>
        </div>
        <div id="card" class="card-slot">?</div>
        <div class="deck-btn" onclick="draw()"></div>
        <a href="mastery.html" class="btn-nav" style="background:green;">سؤال الإتقان ➔</a>
    </div>
    <script>
        let t=52, r=26, b=26;
        function draw() {
            if(t<=1) return;
            let isRed = Math.random() < (r/t);
            if(isRed) { r--; document.getElementById('card').innerText="♥"; document.getElementById('card').style.color="red"; }
            else { b--; document.getElementById('card').innerText="♠"; document.getElementById('card').style.color="black"; }
            t--;
            document.getElementById('vTotal').innerText = "المقام: " + t;
            document.getElementById('vA').innerText = r+"/"+t;
            document.getElementById('vB').innerText = b+"/"+t;
            document.getElementById('barA').style.height = (r/t*100)+"%";
            document.getElementById('barB').style.height = (b/t*100)+"%";
            if(t===50) { localStorage.setItem('badge', 'مستكشف'); alert('🎉 حصلت على وسام مستكشف!'); }
        }
    </script>
</body>
</html>
